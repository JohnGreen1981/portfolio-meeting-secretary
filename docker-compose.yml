services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: meeting-secretary-telegram-bot-api
    restart: unless-stopped
    env_file:
      - .env.vps
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "127.0.0.1:8081:8081"

  meeting-secretary:
    build: .
    container_name: meeting-secretary
    restart: unless-stopped
    env_file:
      - .env.vps
    depends_on:
      - telegram-bot-api
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

volumes:
  telegram-bot-api-data:
